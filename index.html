["WASHER COVER OUTLANDER L","3975"],["SIDEMIRROR AXELLA 18 WITH CAMERA R","0732"],["SIDEMIRROR AXELLA 18 WITH CAMERA L","2905"],["TAIL LAMP AXELLA 2014 SALOON L","0815"],
["TAIL LAMP AXELLA 2014 HATCH R","1368"],["TAIL LAMP AXELLA 2014 HATCH L","1378"],["REFLECTOR PAJERO","3981"]
    ];
    
    // convert to product objects and remove invalid entries
    let allProducts = fullRawList.filter(p => p[0] && p[0] !== "dr" && p[0].trim().length > 0).map(([name, sku]) => ({
        name: name.trim(),
        sku: sku.toString().trim(),
        category: mapToCategory(name)
    }));
    
    // deduplicate by SKU
    const uniqueProducts = new Map();
    allProducts.forEach(p => { if(!uniqueProducts.has(p.sku)) uniqueProducts.set(p.sku, p); });
    const products = Array.from(uniqueProducts.values());
    console.log("Loaded products:", products.length);
    
    function mapToCategory(productName) {
        const n = productName.toUpperCase();
        if(n.includes("HEADLENS") || n.includes("HEADLIGHT CHROME") || n.includes("HEADLIGHT BRACKET") || n.includes("LED FOG") || n.includes("HEADLAMP PROJECTOR") || n.includes("BULB") || n.includes("TAIL LAMP") || n.includes("TAIL LENS") || n.includes("WINGLIGHT") || n.includes("BUMPER INDICATOR") || n.includes("BALLAST") || n.includes("HORN") || n.includes("MAIN SWITCH") || n.includes("SWITCH COVER")) return "Lighting & Electrical";
        if(n.includes("GRILLE") || n.includes("BUMPER") || n.includes("LOWER GRILLE") || n.includes("FENDER COVER") || n.includes("REARSIDE") || n.includes("ARC MOULDING") || n.includes("BODY MOULDING") || n.includes("WINDSCREEN MOULDING") || n.includes("NUMBER PLATE") || n.includes("RADIATOR PANEL") || n.includes("RADIATOR DEFLECTOR") || n.includes("STONE GUARD") || n.includes("BOOT GARNISH") || n.includes("BOOT COVER") || n.includes("TAIL GATE") || n.includes("WING") || n.includes("VENT") || n.includes("ROOF RACK") || n.includes("MUDFLAP")) return "Body Parts & Exterior";
        if(n.includes("INNER MIRROR") || n.includes("DRIVING MIRROR") || n.includes("INNER HANDLE") || n.includes("OUTER HANDLE") || n.includes("SLIDING HANDLE") || n.includes("BOOT HANDLE") || n.includes("DOOR KNOBS")) return "Mirrors & Handles";
        if(n.includes("BOOT LOCK") || n.includes("METAL LOCK") || n.includes("EDGE LOCK") || n.includes("BOOT CATCHER")) return "Locks & Security";
        if(n.includes("TURBO PIPE") || n.includes("AIR CLEANER") || n.includes("MUFFLER") || n.includes("MINI CATALYTIC") || n.includes("MOTOR") || n.includes("OXYGEN SENSOR")) return "Engine & Mechanical";
        if(n.includes("SUNVISOR") || n.includes("AIR BAG") || n.includes("WEATHERSTRIP") || n.includes("WIRING")) return "Interior Parts";
        if(n.includes("WHEEL CAP") || n.includes("ARM")) return "Wheels & Accessories";
        if(n.includes("WASHER BOTTLE")) return "Fluids & Containers";
        return "Body Parts & Exterior";
    }
    
    const categoriesSet = new Set(products.map(p => p.category));
    const mainCategories = Array.from(categoriesSet).sort();
    
    let currentCat = "all";
    let searchTerm = "";
    
    function filterProducts() {
        return products.filter(p => {
            if(currentCat !== "all" && p.category !== currentCat) return false;
            if(searchTerm && !p.name.toLowerCase().includes(searchTerm.toLowerCase()) && !p.sku.includes(searchTerm)) return false;
            return true;
        });
    }
    
    function render() {
        const filtered = filterProducts();
        const grid = document.getElementById("productsGrid");
        document.getElementById("statsDisplay").innerHTML = `<span><i class="fas fa-database"></i> ${filtered.length} / ${products.length} products</span>`;
        if(filtered.length === 0) { grid.innerHTML = `<div class="no-results"><i class="fas fa-box-open fa-2x"></i><h3>No parts found</h3></div>`; return; }
        grid.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div class="card-badge">
                    <span class="category-tag"><i class="fas fa-tag"></i> ${p.category}</span>
                    <span class="sku">SKU: ${p.sku}</span>
                </div>
                <div class="product-name">${escapeHtml(p.name)}</div>
                <div class="product-footer"><span class="ref-link"><i class="fas fa-barcode"></i> #${p.sku}</span><i class="fas fa-chevron-right" style="color:#8ba0bc;"></i></div>
            </div>
        `).join('');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    
    function populateSelectAndChips() {
        const select = document.getElementById("mainCategorySelect");
        select.innerHTML = '<option value="all">📂 All Categories (3,600+)</option>';
        mainCategories.forEach(c => select.innerHTML += `<option value="${c}">🔧 ${c}</option>`);
        const chipsDiv = document.getElementById("chipsContainer");
        chipsDiv.innerHTML = `<div class="cat-chip active" data-cat="all">✨ All</div>`;
        mainCategories.forEach(c => chipsDiv.innerHTML += `<div class="cat-chip" data-cat="${c}">${c}</div>`);
        document.querySelectorAll('.cat-chip').forEach(chip => chip.addEventListener('click', function() {
            currentCat = this.getAttribute('data-cat');
            document.getElementById("mainCategorySelect").value = currentCat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            render();
        }));
    }
    
    document.getElementById("searchInput").addEventListener("input", (e) => { searchTerm = e.target.value; render(); });
    document.getElementById("mainCategorySelect").addEventListener("change", (e) => { currentCat = e.target.value; document.querySelectorAll('.cat-chip').forEach(c => { if(c.getAttribute('data-cat') === currentCat) c.classList.add('active'); else c.classList.remove('active'); }); render(); });
    document.getElementById("resetBtn").addEventListener("click", () => { searchTerm = ""; currentCat = "all"; document.getElementById("searchInput").value = ""; document.getElementById("mainCategorySelect").value = "all"; document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active')); document.querySelector('.cat-chip[data-cat="all"]').classList.add('active'); render(); });
    
    populateSelectAndChips();
    render();
</script>
</body>
</html>
