<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mhenik Traders | Master Stock Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
        .brand-gradient-text {
            background: linear-gradient(to right, #2563eb, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-glow:focus { box-shadow: 0 0 20px rgba(37, 99, 235, 0.25); }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col antialiased">

    <header class="bg-slate-900/90 border-b border-slate-800/80 sticky top-0 z-40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <img src="logomhenik.jpg" alt="Mhenik Traders Logo" class="h-14 w-auto object-contain rounded-lg bg-white p-0.5 border border-slate-700 shadow-xl" onerror="this.src='https://placehold.co/150x150/ffffff/000000?text=MHENIK'">
                <div>
                    <span class="text-lg font-extrabold tracking-wide text-white block">MHENIK TRADERS</span>
                    <span class="text-[10px] text-blue-400 font-bold tracking-widest uppercase flex items-center gap-1">
                        <i class="fas fa-shield-alt text-red-500"></i> Kirinyaga Road Auto Hub
                    </span>
                </div>
            </div>
            <div>
                <a href="https://wa.me/254700000000" target="_blank" class="flex items-center space-x-2 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-xl text-xs font-bold border border-emerald-500/30 transition-all">
                    <i class="fab fa-whatsapp text-emerald-500"></i>
                    <span>Order Hot Desk</span>
                </a>
            </div>
        </div>
    </header>

    <section class="py-12 bg-gradient-to-b from-slate-900 to-slate-950 text-center px-4 border-b border-slate-800/60">
        <div class="max-w-3xl mx-auto space-y-4">
            <h1 class="text-3xl md:text-5xl font-black text-white">Full Stock <span class="brand-gradient-text">Search Engine</span></h1>
            <p class="text-slate-400 text-xs md:text-sm">Instant pagination and real-time query engine across thousands of auto components.</p>
            
            <div class="relative max-w-2xl mx-auto pt-2">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500"><i class="fas fa-search"></i></span>
                <input type="text" id="catalogSearch" oninput="handleSearch()" placeholder="Search by name, vehicle chassis (Benz, CX5, Axela) or exact SKU..." 
                    class="w-full pl-11 pr-4 py-3.5 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 search-glow transition-all text-sm font-medium">
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <aside class="space-y-4">
                <div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-800/80 backdrop-blur-md sticky top-24">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center justify-between">
                        <span>Filter Matrix</span>
                        <i class="fas fa-sliders-h text-blue-500"></i>
                    </h3>
                    <div class="space-y-1.5" id="categoryFilters">
                        <button onclick="filterCategory(event, 'all')" class="category-btn w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold bg-gradient-to-r from-blue-600 to-blue-700 text-white transition-all flex items-center justify-between">
                            <span>All Stock Lines</span>
                            <span class="bg-blue-900/50 text-blue-200 px-2 py-0.5 rounded text-[10px]" id="count-all">0</span>
                        </button>
                        <button onclick="filterCategory(event, 'lighting')" class="category-btn w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition-all flex items-center justify-between">
                            <span>Lighting & Electrical</span>
                            <span class="bg-slate-800 text-slate-400 px-2 py-0.5 rounded text-[10px]" id="count-lighting">0</span>
                        </button>
                        <button onclick="filterCategory(event, 'body')" class="category-btn w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-800/60 hover:text-slate-200 transition-all flex items-center justify-between">
                            <span>Body Parts & Exterior</span>
                            <span class="bg-slate-800 text-slate-400 px-2 py-0.5 rounded text-[10px]" id="count-body">0</span>
                        </button>
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-3 space-y-4">
                <div class="flex items-center justify-between border-b border-slate-800/60 pb-3">
                    <span id="productCount" class="text-xs font-bold uppercase tracking-widest text-slate-500">Connecting database stream...</span>
                    <span id="paginationInfo" class="text-xs font-medium text-slate-400"></span>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5" id="catalogGrid"></div>

                <div class="flex items-center justify-between pt-6" id="paginationControls">
                    <button onclick="changePage(-1)" id="btnPrev" class="px-4 py-2 bg-slate-900 text-slate-300 text-xs font-bold rounded-xl border border-slate-800 disabled:opacity-30 disabled:pointer-events-none hover:bg-slate-800 transition-all">Back</button>
                    <button onclick="changePage(1)" id="btnNext" class="px-4 py-2 bg-slate-900 text-slate-300 text-xs font-bold rounded-xl border border-slate-800 disabled:opacity-30 disabled:pointer-events-none hover:bg-slate-800 transition-all">Next</button>
                </div>
            </section>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-black/85 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 max-w-md w-full rounded-2xl overflow-hidden p-6 space-y-5 transform scale-95 transition-all relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i class="fas fa-times text-lg"></i></button>
            <div class="h-36 bg-slate-950 rounded-xl flex items-center justify-center border border-slate-800"><i class="fas fa-box text-3xl text-slate-800"></i></div>
            <div>
                <span id="modalSku" class="text-xs font-mono text-red-500 font-bold bg-red-500/10 px-2 py-0.5 rounded border border-red-500/20"></span>
                <h3 id="modalTitle" class="text-base font-bold text-white mt-3"></h3>
                <p id="modalCategory" class="text-xs text-blue-400 font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <div class="pt-2">
                <a id="modalWhatsappBtn" href="#" target="_blank" class="w-full flex items-center justify-center space-x-2 bg-gradient-to-r from-emerald-600 to-emerald-700 text-white font-bold py-3 px-4 rounded-xl text-xs shadow-lg transition-all">
                    <i class="fab fa-whatsapp text-base"></i><span>Inquire via WhatsApp</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let filteredDataset = [];
        let currentCategory = 'all';
        let currentPage = 1;
        const itemsPerPage = 24;

        async function loadInventory() {
            try {
                const response = await fetch('products.json');
                allProducts = await response.json();
                filteredDataset = [...allProducts];
                
                let lighting = allProducts.filter(p => p.cat === 'lighting').length;
                let body = allProducts.filter(p => p.cat === 'body').length;
                
                document.getElementById('count-all').innerText = allProducts.length.toLocaleString();
                document.getElementById('count-lighting').innerText = lighting.toLocaleString();
                document.getElementById('count-body').innerText = body.toLocaleString();
                
                renderPage();
            } catch (error) {
                document.getElementById('productCount').innerText = "Awaiting complete data arrays...";
            }
        }

        function renderPage() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            
            const totalPages = Math.max(1, Math.ceil(filteredDataset.length / itemsPerPage));
            currentPage = Math.min(currentPage, totalPages);

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const activePageData = filteredDataset.slice(start, end);

            if(activePageData.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-600">No components match search terms.</div>`;
                document.getElementById('productCount').innerText = `Displaying 0 of ${filteredDataset.length.toLocaleString()} items`;
                document.getElementById('paginationInfo').innerText = `Page ${currentPage} of ${totalPages}`;
                document.getElementById('btnPrev').disabled = (currentPage === 1);
                document.getElementById('btnNext').disabled = true;
                return;
            }

            activePageData.forEach(product => {
                const card = document.createElement('div');
                card.className = 'bg-slate-900/40 border border-slate-800 rounded-xl p-4 flex flex-col justify-between group';
                card.innerHTML = `
                    <div class="space-y-3">
                        <div class="h-24 bg-slate-950 rounded-lg flex items-center justify-center relative">
                            <i class="fas fa-cogs text-xl text-slate-800"></i>
                            <span class="absolute top-2 right-2 bg-slate-900 text-slate-500 font-mono text-[9px] px-2 py-0.5 rounded border border-slate-800">SKU: ${product.sku}</span>
                        </div>
                        <div>
                            <span class="text-[9px] uppercase font-extrabold text-blue-500 block">${product.displayCat}</span>
                            <h3 class="text-xs font-bold text-white line-clamp-2 mt-0.5">${product.name}</h3>
                        </div>
                    </div>
                    <button onclick='openModal(${JSON.stringify(product.sku)}, ${JSON.stringify(product.name)}, ${JSON.stringify(product.displayCat)})' class="w-full mt-4 bg-slate-800 hover:bg-gradient-to-r hover:from-blue-600 hover:to-red-600 text-slate-300 hover:text-white text-[11px] font-bold py-2 rounded-lg transition-all border border-slate-700/40">Inquire Part</button>
                `;
                grid.appendChild(card);
            });

            document.getElementById('productCount').innerText = `Displaying ${start + 1}-${Math.min(end, filteredDataset.length)} of ${filteredDataset.length.toLocaleString()} items`;
            document.getElementById('paginationInfo').innerText = `Page ${currentPage} of ${Math.ceil(filteredDataset.length / itemsPerPage) || 1}`;
            document.getElementById('btnPrev').disabled = (currentPage === 1);
            document.getElementById('btnNext').disabled = (currentPage === Math.ceil(filteredDataset.length / itemsPerPage));
        }

        function handleSearch() {
            const query = document.getElementById('catalogSearch').value.toLowerCase().trim();
            filteredDataset = allProducts.filter(product => {
                const matchCat = (currentCategory === 'all' || product.cat === currentCategory);
                const matchQuery = product.name.toLowerCase().includes(query) || product.sku.toLowerCase().includes(query);
                return matchCat && matchQuery;
            });
            currentPage = 1;
            renderPage();
        }

        function filterCategory(event, cat) {
            currentCategory = cat;
            const buttons = document.getElementsByClassName('category-btn');
            for (let btn of buttons) btn.className = "category-btn w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-800/60";
            event.currentTarget.className = "category-btn w-full text-left px-3 py-2.5 rounded-xl text-xs font-bold bg-gradient-to-r from-blue-600 to-blue-700 text-white transition-all";
            document.getElementById('catalogSearch').value = '';
            handleSearch();
        }

        function changePage(step) { currentPage += step; renderPage(); window.scrollTo({top: 200, behavior: 'smooth'}); }
        
        function openModal(sku, name, cat) {
            const clearName = name;
            document.getElementById('modalSku').innerText = `SKU #: ${sku}`;
            document.getElementById('modalTitle').innerText = clearName;
            document.getElementById('modalCategory').innerText = cat;
            document.getElementById('modalWhatsappBtn').href = `https://wa.me/254700000000?text=${encodeURIComponent('Hello Mhenik Traders, checking stock details for: ' + clearName + ' (SKU: ' + sku + ')')}`;
            document.getElementById('productModal').style.display = "flex";
        }
        function closeModal() { document.getElementById('productModal').style.display = "none"; }
        window.onload = loadInventory;
    </script>
</body>
</html>
